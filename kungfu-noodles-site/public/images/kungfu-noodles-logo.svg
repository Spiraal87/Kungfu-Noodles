<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260" width="220" height="260">
  <!-- Background -->
  <rect width="220" height="260" fill="#f0e8d0" rx="8"/>

  <!-- Chopstick left (angled \) -->
  <line x1="82" y1="28" x2="100" y2="108" stroke="#8b1a1a" stroke-width="7" stroke-linecap="round"/>
  <!-- Chopstick right (angled /) -->
  <line x1="138" y1="28" x2="120" y2="108" stroke="#8b1a1a" stroke-width="7" stroke-linecap="round"/>

  <!-- Star at chopstick crossing (~57,65) -->
  <!-- 5-pointed star centered at 110, 52 -->
  <polygon
    points="110,36 114.7,49.8 129.4,49.8 117.9,58.2 122.6,72 110,63.6 97.4,72 102.1,58.2 90.6,49.8 105.3,49.8"
    fill="#8b1a1a"
  />

  <!-- Bowl outer shape -->
  <path
    d="M62,110 L158,110 Q162,110 161,118 Q155,158 110,168 Q65,158 59,118 Q58,110 62,110 Z"
    fill="#8b1a1a"
  />

  <!-- Bowl inner cutout (cream noodle area) -->
  <path
    d="M70,114 L150,114 Q153,114 152,121 Q147,153 110,162 Q73,153 68,121 Q67,114 70,114 Z"
    fill="#f0e8d0"
  />

  <!-- Noodle wavy lines inside bowl -->
  <!-- Line 1 -->
  <path d="M80,126 Q88,121 96,126 Q104,131 112,126 Q120,121 128,126 Q136,131 140,127"
        fill="none" stroke="#8b1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Line 2 -->
  <path d="M76,138 Q84,133 93,138 Q102,143 111,138 Q120,133 129,138 Q136,143 143,139"
        fill="none" stroke="#8b1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Line 3 -->
  <path d="M80,150 Q89,145 98,150 Q107,155 116,150 Q124,145 132,150"
        fill="none" stroke="#8b1a1a" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bowl base / foot -->
  <rect x="90" y="166" width="40" height="7" rx="3.5" fill="#8b1a1a"/>
  <rect x="82" y="173" width="56" height="7" rx="3.5" fill="#8b1a1a"/>

  <!-- Text: KUNGFU -->
  <text
    x="110"
    y="210"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="34"
    font-weight="900"
    fill="#8b1a1a"
    text-anchor="middle"
    letter-spacing="3"
  >KUNGFU</text>

  <!-- Text: NOODLES -->
  <text
    x="110"
    y="246"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="34"
    font-weight="900"
    fill="#8b1a1a"
    text-anchor="middle"
    letter-spacing="3"
  >NOODLES</text>
</svg>
